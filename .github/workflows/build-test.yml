name: Build & Test Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install system dependencies (Linux WebKit requirements for Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install node dependencies
        run: |
          cd ziwei
          pnpm install --no-frozen-lockfile

      - name: Frontend build check
        run: |
          cd ziwei
          pnpm build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android target (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          rustup target add aarch64-linux-android

      - name: Cargo check (Rust backend)
        run: |
          cd ziwei/src-tauri
          cargo check

      - name: Build Tauri app (Linux - APK)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd ziwei
          pnpm tauri build -- --target aarch64-linux-android

      - name: Build Tauri app (Windows - EXE)
        if: matrix.os == 'windows-latest'
        run: |
          cd ziwei
          pnpm tauri build

      - name: Upload APK artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ziwei/src-tauri/target/aarch64-linux-android/release/*.apk
          retention-days: 30

      - name: Upload EXE artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-exe
          path: ziwei/src-tauri/target/release/*.exe
          retention-days: 30
