name: Build & Test Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libclang-dev \
            curl \
            perl

      - name: Install node dependencies
        run: |
          cd ziwei
          pnpm install --no-frozen-lockfile

      - name: Frontend build check
        run: |
          cd ziwei
          pnpm build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Android: full APK build (Linux runner)
        if: matrix.os == 'ubuntu-latest'
        env:
          OPENSSL_VERSION: 3.2.1
          ANDROID_API: 21
        run: |
          set -euo pipefail

          # Install Android NDK and set up toolchain
          echo "Installing Android NDK..."
          curl -sSL https://raw.githubusercontent.com/nttld/setup-ndk/main/install.sh | bash -s -- r25c /tmp/android-ndk
          export ANDROID_NDK_ROOT=/tmp/android-ndk
          export PATH="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"

          # Verify clang wrapper availability
          if ! command -v aarch64-linux-android${ANDROID_API}-clang >/dev/null 2>&1 && ! command -v aarch64-linux-android-clang >/dev/null 2>&1; then
            echo "ERROR: Android clang wrapper not found in PATH" >&2
            exit 1
          fi

          # Install Rust target for Android
          rustup target add aarch64-linux-android

          # Build OpenSSL for android-arm64 into a temporary prefix
          echo "Building OpenSSL ${OPENSSL_VERSION} for android-arm64..."
          cd /tmp
          curl -sLO https://www.openssl.org/source/openssl-${OPENSSL_VERSION}.tar.gz
          tar xf openssl-${OPENSSL_VERSION}.tar.gz
          cd openssl-${OPENSSL_VERSION}

          # Choose clang wrapper for the API level if available
          CC_WRAPPER="$(command -v aarch64-linux-android${ANDROID_API}-clang || command -v aarch64-linux-android-clang)"
          AR_TOOL="$(command -v llvm-ar || command -v aarch64-linux-android-ar)"

          export CC="${CC_WRAPPER}"
          export AR="${AR_TOOL}"

          ./Configure android-arm64 no-shared --prefix=/tmp/openssl-android -D__ANDROID_API__=${ANDROID_API}
          make -j$(nproc)
          make install_sw

          # Confirm install
          ls -la /tmp/openssl-android || true

          # Build the Tauri Android APK using the Android-built OpenSSL
          cd ${GITHUB_WORKSPACE}/ziwei

          export AARCH64_LINUX_ANDROID_OPENSSL_LIB_DIR=/tmp/openssl-android/lib
          export AARCH64_LINUX_ANDROID_OPENSSL_INCLUDE_DIR=/tmp/openssl-android/include
          export OPENSSL_STATIC=1
          export PKG_CONFIG_PATH=/tmp/openssl-android/lib/pkgconfig:${PKG_CONFIG_PATH:-}
          export CC_aarch64_linux_android=$(command -v aarch64-linux-android${ANDROID_API}-clang || command -v aarch64-linux-android-clang)
          export AR_aarch64_linux_android=$(command -v llvm-ar || command -v aarch64-linux-android-ar)
          export CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$CC_aarch64_linux_android
          export CARGO_CFG_OPENSSL_STATIC=1

          echo "Starting pnpm tauri build for aarch64-linux-android..."
          pnpm tauri build -- --target aarch64-linux-android

      - name: Build Tauri app (Windows - EXE)
        if: matrix.os == 'windows-latest'
        run: |
          cd ziwei
          pnpm tauri build

      - name: Upload APK artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: ziwei/src-tauri/target/aarch64-linux-android/release/*.apk
          retention-days: 30

      - name: Upload EXE artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: app-exe
          path: ziwei/src-tauri/target/release/*.exe
          retention-days: 30
