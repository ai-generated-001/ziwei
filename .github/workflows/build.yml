name: Build Tauri v2 (Windows & Android)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # 增加 Rust 构建缓存（显著缩短 Windows 编译时间）
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ziwei/src-tauri -> target"

      - name: Install frontend dependencies
        run: |
          cd ziwei
          pnpm install --no-frozen-lockfile

      - name: Build Tauri app (Windows)
        run: |
          cd ziwei
          pnpm tauri build

      - name: Upload Windows EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-exe
          path: ziwei/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  build-android:
    name: Build Android (.apk)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Rust toolchain and Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # 增加 Rust 构建缓存（显著缩短 Android 编译时间）
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "ziwei/src-tauri -> target"

      - name: Install Android NDK 26.1.10909125
        run: |
          echo "Installing Android NDK 26.1.10909125..."
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: |
          cd ziwei
          pnpm install --no-frozen-lockfile

      - name: Build Android APK
        run: |
          cd ziwei
          # 仅当 gen/android 不存在时才执行 init，防止覆盖已有配置
          if [ ! -d "src-tauri/gen/android" ]; then
            pnpm tauri android init
          fi
          pnpm tauri android build

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          # 使用通配符，确保无论 Gradle 打出单架构包还是 Universal 包都能被捕获
          path: ziwei/src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
